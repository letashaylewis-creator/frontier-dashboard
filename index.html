<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Frontier Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0C447C;
      --navy-dark: #042C53;
      --navy-light: #185FA5;
      --navy-pale: #E6F1FB;
      --navy-mid: #B5D4F4;
      --green: #3B6D11;
      --green-light: #EAF3DE;
      --red: #A32D2D;
      --red-light: #FCEBEB;
      --red-mid: #F09595;
      --text: #1a1a1a;
      --text-muted: #6b6b6b;
      --border: #e0e0e0;
      --bg: #f4f6f9;
      --card: #ffffff;
      --card-secondary: #f0f3f7;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Top nav */
    .topnav {
      background: var(--navy-dark);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    .topnav-logo { color: white; font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
    .topnav-logo span { color: var(--navy-mid); }
    .topnav-right { display: flex; align-items: center; gap: 16px; }
    .topnav-date { font-size: 12px; color: var(--navy-mid); }
    .refresh-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.1); }

    /* Layout */
    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

    /* Setup card */
    .setup-card {
      background: var(--card);
      border-radius: 12px;
      border: 1px solid var(--border);
      padding: 2rem;
      max-width: 520px;
      margin: 3rem auto;
    }
    .setup-card h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; color: var(--navy-dark); }
    .setup-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 1.5rem; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .form-group input {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .form-group input:focus { border-color: var(--navy-light); }
    .connect-btn {
      width: 100%;
      padding: 11px;
      background: var(--navy);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .connect-btn:hover { background: var(--navy-light); }

    /* Metrics row */
    .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 2rem; }
    .metric {
      background: var(--card);
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 1.25rem;
    }
    .metric-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 8px; }
    .metric-value { font-size: 28px; font-weight: 600; color: var(--text); }
    .metric-value.good { color: var(--green); }
    .metric-value.warn { color: var(--red); }
    .metric-value.navy { color: var(--navy); }

    /* Section title */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .section-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-muted); }

    /* Worker grid */
    .workers { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; margin-bottom: 2rem; }
    .worker-card {
      background: var(--card);
      border-radius: 10px;
      border: 1px solid var(--border);
      border-left: 4px solid var(--border);
      padding: 1.25rem;
    }
    .worker-card.ok { border-left-color: #639922; }
    .worker-card.flagged { border-left-color: #E24B4A; }

    .worker-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
    .worker-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--navy-pale);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 600; color: var(--navy);
      flex-shrink: 0;
    }
    .worker-avatar.flagged-av { background: #FCEBEB; color: #A32D2D; }
    .worker-info { flex: 1; margin-left: 10px; }
    .worker-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .worker-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .status-pill {
      font-size: 11px; padding: 3px 10px;
      border-radius: 20px; font-weight: 500; flex-shrink: 0;
    }
    .status-pill.ok { background: var(--green-light); color: var(--green); }
    .status-pill.warn { background: var(--red-light); color: var(--red); }

    .hours-section { margin-bottom: 12px; }
    .hours-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
    .hours-row strong { color: var(--text); font-weight: 600; }
    .bar-bg { background: var(--card-secondary); border-radius: 4px; height: 6px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
    .bar-fill.good { background: #639922; }
    .bar-fill.warn { background: #E24B4A; }

    .worker-stats { display: flex; gap: 0; border-top: 1px solid var(--border); padding-top: 12px; }
    .stat-item { flex: 1; text-align: center; }
    .stat-item:not(:last-child) { border-right: 1px solid var(--border); }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); }
    .stat-value { font-size: 13px; font-weight: 600; color: var(--text); margin-top: 3px; }

    /* AI Summary */
    .ai-card {
      background: var(--card);
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 1.5rem;
      margin-bottom: 2rem;
    }
    .ai-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .ai-icon {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--navy-pale);
      display: flex; align-items: center; justify-content: center;
    }
    .ai-icon svg { width: 16px; height: 16px; }
    .ai-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .ai-subtitle { font-size: 12px; color: var(--text-muted); }
    .ai-text { font-size: 13px; color: var(--text-muted); line-height: 1.7; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }

    /* Error / loading */
    .error-box { background: var(--red-light); border: 1px solid var(--red-mid); border-radius: 8px; padding: 1rem 1.25rem; font-size: 13px; color: var(--red); margin-bottom: 1rem; }
    .loading { text-align: center; padding: 4rem 2rem; color: var(--text-muted); font-size: 14px; }
    .loading-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav class="topnav">
  <div class="topnav-logo"><img src="frontier logo clear.png" alt="Frontier" style="height:32px;vertical-align:middle;" /></div>
  <div class="topnav-right">
    <span class="topnav-date" id="nav-date"></span>
    <button class="refresh-btn" onclick="loadData()">Refresh</button>
  </div>
</nav>

<div class="container">
  <div id="error" style="display:none;" class="error-box"></div>

  <!-- Setup -->
  <div id="setup-card" class="setup-card">
    <h2>Connect your dashboard</h2>
    <p>Enter your Supabase credentials to load live worker activity data.</p>
    <div class="form-group">
      <label>Supabase Project URL</label>
      <input id="sb-url" type="text" placeholder="https://xxxxxxxxxxxx.supabase.co" />
    </div>
    <div class="form-group">
      <label>Supabase Service Role Key</label>
      <input id="sb-key" type="password" placeholder="eyJ..." />
    </div>
    <button class="connect-btn" onclick="connectSupabase()">Connect to Supabase</button>
  </div>

  <!-- Loading -->
  <div id="loading" style="display:none;" class="loading">
    <div class="loading-spinner"></div>
    Loading worker activity data...
  </div>

  <!-- Main content -->
  <div id="main-content" style="display:none;">
    <div class="metrics" id="metrics"></div>

    <div class="section-header">
      <span class="section-title">Worker activity</span>
      <span id="data-date" style="font-size:12px;color:var(--text-muted);"></span>
    </div>
    <div class="workers" id="workers"></div>

    <div class="section-header"><span class="section-title">AI daily summary</span></div>
    <div class="ai-card">
      <div class="ai-header">
        <div class="ai-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#0C447C" stroke-width="2">
            <path d="M12 2a10 10 0 1 0 10 10"/>
            <path d="M12 6v6l4 2"/>
          </svg>
        </div>
        <div>
          <div class="ai-title">Claude AI analysis</div>
          <div class="ai-subtitle" id="ai-subtitle">Powered by Anthropic</div>
        </div>
      </div>
      <div class="ai-text" id="ai-text">No summary available.</div>
    </div>
  </div>
</div>

<script>
  let SUPABASE_URL = '';
  let SUPABASE_KEY = '';

  const WORKER_NAMES = {
    '4050851': 'Akbar Ali Khan',
    '4050909': 'Amjad Iqbal',
    '4055442': 'Bianca Sia',
    '4050353': 'Epharata Palmer',
    '4051460': 'Hannah Sevilla',
    '4050881': 'Imtiaz Ali Khan',
    '4053916': 'Jocelyn Palmer',
    '4052836': 'Karen Alesna-Manalo',
    '4050303': 'Letasha Lewis',
    '4050932': 'Miraluna Pestanas',
    '4050878': 'Qurban Ali Khan',
    '4051360': 'Samreen Bibi',
    '4050712': 'Sierra Brown'
  };

  function getWorkerName(user_id) {
    return WORKER_NAMES[String(user_id)] || `Worker ${user_id}`;
  }

  function getInitials(name) {
    return name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
  }

  function connectSupabase() {
    SUPABASE_URL = document.getElementById('sb-url').value.trim().replace(/\/$/, '');
    SUPABASE_KEY = document.getElementById('sb-key').value.trim();
    if (!SUPABASE_URL || !SUPABASE_KEY) { showError('Please enter both your Supabase URL and key.'); return; }
    localStorage.setItem('sb_url', SUPABASE_URL);
    localStorage.setItem('sb_key', SUPABASE_KEY);
    document.getElementById('setup-card').style.display = 'none';
    loadData();
  }

  async function loadData() {
    const url = SUPABASE_URL || localStorage.getItem('sb_url');
    const key = SUPABASE_KEY || localStorage.getItem('sb_key');
    if (!url || !key) { document.getElementById('setup-card').style.display = 'block'; return; }
    SUPABASE_URL = url; SUPABASE_KEY = key;

    document.getElementById('setup-card').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('main-content').style.display = 'none';
    document.getElementById('error').style.display = 'none';

    try {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const dateStr = yesterday.toISOString().split('T')[0];
      const navDate = yesterday.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
      document.getElementById('nav-date').textContent = navDate;

      let res = await fetch(`${url}/rest/v1/worker_daily_summary?date=eq.${dateStr}&select=*&order=tracked_seconds.desc`, {
        headers: { 'apikey': key, 'Authorization': `Bearer ${key}` }
      });
      if (!res.ok) throw new Error(`Status ${res.status} — check your credentials`);
      let data = await res.json();

      if (!data.length) {
        res = await fetch(`${url}/rest/v1/worker_daily_summary?select=*&order=created_at.desc&limit=50`, {
          headers: { 'apikey': key, 'Authorization': `Bearer ${key}` }
        });
        data = await res.json();
      }

      if (!data.length) { showError('No data found. Make sure your Make.com scenario has run at least once.'); return; }

      renderDashboard(data);
    } catch(e) {
      showError('Connection failed: ' + e.message);
      document.getElementById('setup-card').style.display = 'block';
    } finally {
      document.getElementById('loading').style.display = 'none';
    }
  }

  function renderDashboard(rows) {
    document.getElementById('main-content').style.display = 'block';

    const total = rows.length;
    const flagged = rows.filter(r => (r.tracked_seconds || 0) < 21600).length;
    const avg = rows.reduce((a, r) => a + (r.tracked_seconds || 0), 0) / total / 3600;
    const full = rows.filter(r => (r.tracked_seconds || 0) >= 28800).length;

    document.getElementById('data-date').textContent = rows[0]?.date || '';
    document.getElementById('metrics').innerHTML = `
      <div class="metric"><div class="metric-label">Total workers</div><div class="metric-value navy">${total}</div></div>
      <div class="metric"><div class="metric-label">Avg hours</div><div class="metric-value ${avg >= 6 ? 'good' : 'warn'}">${avg.toFixed(1)}h</div></div>
      <div class="metric"><div class="metric-label">Full days</div><div class="metric-value good">${full}</div></div>
      <div class="metric"><div class="metric-label">Flagged</div><div class="metric-value ${flagged > 0 ? 'warn' : 'good'}">${flagged}</div></div>
    `;

    document.getElementById('workers').innerHTML = rows.map(r => {
      const hrs = (r.tracked_seconds || 0) / 3600;
      const pct = Math.min(100, Math.round(hrs / 8 * 100));
      const ok = hrs >= 6;
      const name = getWorkerName(r.user_id);
      const initials = getInitials(name);
      return `
        <div class="worker-card ${ok ? 'ok' : 'flagged'}">
          <div class="worker-top">
            <div class="worker-avatar ${ok ? '' : 'flagged-av'}">${initials}</div>
            <div class="worker-info">
              <div class="worker-name">${name}</div>
              <div class="worker-meta">Project ${r.project_id || 'N/A'}</div>
            </div>
            <span class="status-pill ${ok ? 'ok' : 'warn'}">${ok ? 'On track' : 'Flagged'}</span>
          </div>
          <div class="hours-section">
            <div class="hours-row"><span>Hours tracked</span><strong>${hrs.toFixed(1)}h / 8h target</strong></div>
            <div class="bar-bg"><div class="bar-fill ${ok ? 'good' : 'warn'}" style="width:${pct}%"></div></div>
          </div>
          <div class="worker-stats">
            <div class="stat-item"><div class="stat-label">Keyboard</div><div class="stat-value">${(r.keyboard || 0).toLocaleString()}</div></div>
            <div class="stat-item"><div class="stat-label">Mouse</div><div class="stat-value">${(r.mouse || 0).toLocaleString()}</div></div>
            <div class="stat-item"><div class="stat-label">Overall</div><div class="stat-value">${(r.overall || 0).toLocaleString()}</div></div>
          </div>
        </div>`;
    }).join('');

    const summary = rows.find(r => r.ai_summary)?.ai_summary || 'No AI summary available for this date.';
    document.getElementById('ai-text').textContent = summary;
    document.getElementById('ai-subtitle').textContent = `Generated for ${rows[0]?.date || 'today'}`;
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.style.display = 'block';
    el.textContent = msg;
    document.getElementById('loading').style.display = 'none';
  }

  window.onload = () => {
    const saved_url = localStorage.getItem('sb_url');
    const saved_key = localStorage.getItem('sb_key');
    if (saved_url && saved_key) {
      SUPABASE_URL = saved_url;
      SUPABASE_KEY = saved_key;
      document.getElementById('setup-card').style.display = 'none';
      loadData();
    }
  };
</script>
</body>
</html>
